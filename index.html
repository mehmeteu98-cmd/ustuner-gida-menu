<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üstüner Toptan Gıda</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.search-box {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.menu-section {
  background: white;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  overflow: hidden;
}

.category-header {
  padding: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  background: #e2e8f0;
}

.products {
  display: none;
  padding: 10px 15px;
}

.menu-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f1f1f1;
  cursor: pointer;
}

.menu-item:last-child {
  border-bottom: none;
}

.product-price {
  font-weight: bold;
}
</style>
</head>

<body>

<header>Üstüner Toptan Gıda</header>

<div class="container">
  <input type="text" id="search" class="search-box" placeholder="Ürün ara...">
  <div id="menu-container"></div>
</div>

<script>

const phoneNumber = "905444465503"; // 05444465503 → başına 90 eklendi

fetch("data.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("menu-container");
    const searchInput = document.getElementById("search");

    function renderMenu(filter = "") {
      container.innerHTML = "";

      data.categories.forEach(category => {

        const filteredProducts = category.products.filter(p =>
          p.name.toLowerCase().includes(filter.toLowerCase())
        );

        if (filteredProducts.length === 0) return;

        const section = document.createElement("div");
        section.classList.add("menu-section");

        const header = document.createElement("div");
        header.classList.add("category-header");
        header.innerHTML = `
          <span>${category.name}</span>
          <span>▼</span>
        `;

        const productsDiv = document.createElement("div");
        productsDiv.classList.add("products");

        header.addEventListener("click", () => {
          productsDiv.style.display =
            productsDiv.style.display === "block" ? "none" : "block";
        });

        filteredProducts.forEach(product => {

          const item = document.createElement("div");
          item.classList.add("menu-item");

          item.innerHTML = `
            <span>${product.name}</span>
            <span class="product-price">${product.price} ₺</span>
          `;

          item.addEventListener("click", () => {
            const message = `Merhaba, ${product.name} (${product.price} ₺) sipariş vermek istiyorum.`;
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, "_blank");
          });

          productsDiv.appendChild(item);
        });

        section.appendChild(header);
        section.appendChild(productsDiv);
        container.appendChild(section);
      });
    }

    renderMenu();

    searchInput.addEventListener("input", (e) => {
      renderMenu(e.target.value);
    });

  });

</script>

</body>
</html>
