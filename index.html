<script>
function enterSite() {
document.getElementById('welcome-screen').classList.add('hide');
}

const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
document.getElementById('date').innerHTML = new Date().toLocaleDateString('tr-TR', options);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price){
cart.push({name:name, price:price});
saveCart();

gtag('event','add_to_cart',{
currency:'TRY',
value:price,
items:[{item_name:name, price:price}]
});

alert(name + " sepete eklendi");
}

function sendToWhatsApp(){
if(cart.length===0){
alert("Sepet boş");
return;
}

let message="Merhaba, yeni sipariş:%0A%0A";
let total=0;

cart.forEach((item,index)=>{
message += (index+1)+". "+item.name+" - "+item.price+"₺%0A";
total += parseFloat(item.price);
});

message += "%0AToplam: "+total+"₺";

let phone="905444465503";
let url="https://wa.me/"+phone+"?text="+message;

window.open(url,"_blank");

cart=[];
saveCart();
}

function searchProducts(){
let input=document.getElementById('searchInput');
let filter=input.value.toLowerCase();
let cards=document.getElementsByClassName('product-card');

for(let i=0;i<cards.length;i++){
let name=cards[i].innerText.toLowerCase();
if(name.indexOf(filter)>-1){
cards[i].style.display="flex";
if(filter!=="") cards[i].closest('.category-wrapper').classList.add('active');
}else{
cards[i].style.display="none";
}
}
}

fetch('data.json')
.then(response=>response.json())
.then(data=>{
const root=document.getElementById('menu-root');

data.categories.forEach(cat=>{
const wrapper=document.createElement('div');
wrapper.className='category-wrapper';

const header=document.createElement('div');
header.className='category-header';
header.innerHTML=`<h2>${cat.name}</h2><span>▼</span>`;
header.onclick=function(){this.parentElement.classList.toggle('active');};

const list=document.createElement('div');
list.className='product-list';

cat.products.forEach(prod=>{
const card=document.createElement('div');
card.className='product-card';

card.innerHTML=`
<div>
<div>${prod.name}</div>
<div class="product-price">${prod.price} ₺</div>
</div>
<button style="background:#C9A227;border:none;padding:6px 12px;border-radius:20px;font-weight:bold;cursor:pointer"
onclick="addToCart('${prod.name}', '${prod.price}')">
Sepete Ekle
</button>
`;

list.appendChild(card);
});

wrapper.appendChild(header);
wrapper.appendChild(list);
root.appendChild(wrapper);
});
})
.catch(error=>console.error('Hata:',error));

document.querySelector('.whatsapp-float').addEventListener('click',function(e){
e.preventDefault();
sendToWhatsApp();
});
</script>
